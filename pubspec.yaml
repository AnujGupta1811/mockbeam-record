name: mockbeam_record
description: A Dart CLI proxy that captures real HTTP API responses and writes them as dio_mock_interceptor-compatible YAML.
version: 1.0.1
repository: https://github.com/AnujGupta1811/mockbeam-record

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  args: ^2.5.0
  yaml: ^3.1.0
  yaml_writer: ^2.0.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0

platforms:
  linux:
  macos:
  windows:

executables:
  mockbeam_record: mockbeam_record
